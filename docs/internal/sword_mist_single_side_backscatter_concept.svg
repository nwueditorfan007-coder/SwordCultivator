          stroke="url(#mistMain)" stroke-width="66" stroke-linecap="round" filter="url(#blurXL)"/>
    <path d="M664 -16
             C580 -78 486 -118 384 -148
             C282 -178 176 -196 56 -204"
          stroke="url(#mistMain)" stroke-width="70" stroke-linecap="round" filter="url(#blurXL)"/>
    <path d="M796 -18
             C706 -88 600 -132 486 -166
             C362 -204 238 -222 102 -230"
          stroke="url(#mistMain)" stroke-width="72" stroke-linecap="round" filter="url(#blurXL)"/>
    <path d="M914 -14
             C826 -82 728 -126 620 -156
             C522 -184 420 -198 304 -202"
          stroke="url(#mistMain)" stroke-width="58" stroke-linecap="round" filter="url(#blurXL)"/>

