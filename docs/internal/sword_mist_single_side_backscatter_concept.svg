    <g opacity="0.14">
      <path d="M426 0H160" stroke="#F07D7D" stroke-width="9" stroke-linecap="round"/>
      <path d="M428 10 C364 60 286 94 188 126" stroke="#F07D7D" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <g>
    <circle cx="642" cy="320" r="7" fill="#8FE9FF"/>
    <circle cx="642" cy="320" r="16" stroke="#8FE9FF" stroke-opacity="0.28"/>
    <path d="M642 338L594 404" stroke="#8FE9FF" stroke-opacity="0.72" stroke-width="2"/>
    <text x="520" y="286" fill="#EAF8FF" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">单侧连续出雾</text>
    <text x="486" y="436" fill="#B8D1E6" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">不是局部一点，是剑尖到剑柄整段都在同一侧逸散</text>
  </g>

  <g>
    <circle cx="1114" cy="348" r="7" fill="#8FE9FF"/>
    <circle cx="1114" cy="348" r="16" stroke="#8FE9FF" stroke-opacity="0.28"/>
    <path d="M1096 366L1038 430" stroke="#8FE9FF" stroke-opacity="0.72" stroke-width="2"/>
    <text x="1142" y="340" fill="#EAF8FF" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">方向是“后 + 外”</text>
    <text x="1142" y="372" fill="#B8D1E6" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">既不是垂直炸开，也不是纯后拖，而是斜向后外方</text>
  </g>

  <g>
    <circle cx="372" cy="592" r="7" fill="#8FE9FF"/>
    <circle cx="372" cy="592" r="16" stroke="#8FE9FF" stroke-opacity="0.28"/>
    <path d="M390 592H500" stroke="#8FE9FF" stroke-opacity="0.72" stroke-width="2"/>
    <text x="518" y="584" fill="#EAF8FF" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">不要下侧也出</text>
    <text x="518" y="616" fill="#B8D1E6" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">另一侧只保留很弱的贴体辉光，不要形成对称雾翼</text>
  </g>

  <g>
    <rect x="184" y="710" width="1232" height="60" rx="14" fill="#0C1D2D" fill-opacity="0.72" stroke="#DAB66D" stroke-opacity="0.16"/>
    <text x="212" y="746" fill="#F1D793" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif">实现提示</text>
    <text x="340" y="746" fill="#C6DBEC" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif">用 2~3 条单侧雾片沿剑身采样，偏移方向统一指向同一侧的后外方；尾粒只做极少量陪衬，不再承担主视觉</text>
  </g>
