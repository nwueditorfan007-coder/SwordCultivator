<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="90" x2="1440" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111D"/>
      <stop offset="0.56" stop-color="#0A1727"/>
      <stop offset="1" stop-color="#050910"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10253A" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#091521" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#87DDFF"/>
      <stop offset="0.46" stop-color="#F7FDFF"/>
      <stop offset="1" stop-color="#73CCFF"/>
    </linearGradient>
    <linearGradient id="mistMain" x1="1" y1="0.5" x2="0" y2="0">
      <stop offset="0" stop-color="#BDF7FF" stop-opacity="0.62"/>
      <stop offset="0.34" stop-color="#A7ECFF" stop-opacity="0.34"/>
      <stop offset="0.74" stop-color="#84D5FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#84D5FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mistSoft" x1="1" y1="0.5" x2="0" y2="0.18">
      <stop offset="0" stop-color="#D4FBFF" stop-opacity="0.3"/>
      <stop offset="0.42" stop-color="#9DE4FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7CCEFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurXL" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="blurL" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="blurS" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="138" y="96" width="1324" height="708" rx="28" fill="url(#panel)" stroke="#DAB66D" stroke-opacity="0.2"/>

  <g opacity="0.34">
    <path d="M170 170H1430" stroke="#DAB66D" stroke-opacity="0.24"/>
    <path d="M170 740H1430" stroke="#DAB66D" stroke-opacity="0.24"/>
    <path d="M264 126V774" stroke="#6CA7D8" stroke-opacity="0.12"/>
    <path d="M1336 126V774" stroke="#6CA7D8" stroke-opacity="0.12"/>
  </g>

  <text x="188" y="162" fill="#F5D99A" font-size="34" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">正确方向：单侧外散，并且整段剑刃都向“后 + 外”逸散</text>
  <text x="189" y="206" fill="#C7DDED" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif">如果剑朝右，雾不是上下对称，也不是只从剑柄后拖，而是沿着同一侧刃缘，从剑尖到剑柄整段都往左上方被带开</text>

  <g transform="translate(250 454)">
    <ellipse cx="620" cy="-12" rx="342" ry="54" fill="#83DFFF" fill-opacity="0.05" filter="url(#blurXL)"/>

    <path d="M430 -8
             C376 -58 316 -92 240 -122
