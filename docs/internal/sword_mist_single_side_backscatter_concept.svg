             C394 -38 336 -58 270 -76
             C202 -94 134 -106 58 -112"
          stroke="url(#mistSoft)" stroke-width="26" stroke-linecap="round" filter="url(#blurL)"/>
    <path d="M612 -14
             C530 -70 440 -106 344 -130
             C244 -154 146 -166 44 -170"
          stroke="url(#mistSoft)" stroke-width="30" stroke-linecap="round" filter="url(#blurL)"/>
    <path d="M824 -18
             C736 -88 630 -130 516 -158
             C392 -188 266 -202 130 -204"
          stroke="url(#mistSoft)" stroke-width="32" stroke-linecap="round" filter="url(#blurL)"/>

    <g opacity="0.94">
      <path d="M418 -16 L892 -16 L1018 0 L892 16 L418 16 Z" fill="url(#blade)"/>
      <path d="M360 -22 L420 -16 L420 16 L360 22 L308 0 Z" fill="#8CDAFF" fill-opacity="0.72"/>
      <path d="M304 -12 L322 -12 L322 12 L304 12 Z" fill="#556175"/>
      <path d="M284 -20 L308 -8 L308 8 L284 20 L244 0 Z" fill="#87D8FF" fill-opacity="0.72"/>
      <path d="M426 0 L938 0" stroke="#FFFFFF" stroke-opacity="0.84" stroke-width="3.2" stroke-linecap="round"/>
      <path d="M428 -13 L892 -16" stroke="#98E5FF" stroke-opacity="0.46" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M428 13 L892 16" stroke="#98E5FF" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g filter="url(#blurS)" opacity="0.72">
      <circle cx="572" cy="-86" r="3.4" fill="#E9FFFF"/>
      <circle cx="488" cy="-110" r="2.4" fill="#D6FBFF"/>
      <circle cx="374" cy="-134" r="2.6" fill="#D6FBFF"/>
      <circle cx="250" cy="-154" r="2.1" fill="#C0F2FF"/>
      <circle cx="138" cy="-168" r="1.8" fill="#C0F2FF"/>
      <circle cx="738" cy="-112" r="3.2" fill="#E9FFFF"/>
      <circle cx="646" cy="-150" r="2.5" fill="#D6FBFF"/>
      <circle cx="524" cy="-184" r="2.5" fill="#D6FBFF"/>
