<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="90" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111D"/>
      <stop offset="0.52" stop-color="#0D1C2D"/>
      <stop offset="1" stop-color="#060B13"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10263A" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0A1623" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ADFFF"/>
      <stop offset="0.46" stop-color="#F4FCFF"/>
      <stop offset="1" stop-color="#72C9FF"/>
    </linearGradient>
    <linearGradient id="edgeMist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#86EAFF" stop-opacity="0"/>
      <stop offset="0.26" stop-color="#A9F2FF" stop-opacity="0.74"/>
      <stop offset="0.72" stop-color="#9EDCFF" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#8ADFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trailMist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8EE8FF" stop-opacity="0"/>
      <stop offset="0.16" stop-color="#BAF7FF" stop-opacity="0.46"/>
      <stop offset="0.5" stop-color="#86D6FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#86D6FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="mistBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="fineMist" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="smallGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.38">
    <path d="M130 130H1470" stroke="#D8B56B" stroke-opacity="0.28"/>
    <path d="M130 770H1470" stroke="#D8B56B" stroke-opacity="0.28"/>
    <path d="M220 90V810" stroke="#6AA6D9" stroke-opacity="0.12"/>
    <path d="M1380 90V810" stroke="#6AA6D9" stroke-opacity="0.12"/>
  </g>

  <rect x="150" y="100" width="1300" height="700" rx="30" fill="url(#panel)" stroke="#D8B56B" stroke-opacity="0.22"/>

  <text x="190" y="165" fill="#F5D99A" font-size="34" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">目标方向：剑气不是点粒子，而是“贴体生雾 -> 边缘散开 -> 尾端消散”</text>
  <text x="191" y="210" fill="#C3DDF2" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif">更像水汽/丝绸状薄雾，被剑气卷起后逐渐散掉，而不是一串硬点子弹</text>

  <g transform="translate(290 470) rotate(-2)">
    <ellipse cx="355" cy="0" rx="360" ry="84" fill="#7EDCFF" fill-opacity="0.06" filter="url(#mistBlur)"/>
    <ellipse cx="640" cy="0" rx="210" ry="56" fill="#8EE8FF" fill-opacity="0.08" filter="url(#mistBlur)"/>

    <path d="M120 -30
             C170 -92 288 -98 414 -58
             C532 -22 676 22 804 10
             C920 -2 1010 -36 1090 -42
             C1178 -50 1272 -18 1328 18"
          stroke="url(#trailMist)" stroke-width="74" stroke-linecap="round" filter="url(#mistBlur)"/>

    <path d="M164 18
             C238 -34 342 -42 454 -18
             C556 4 658 30 770 22
             C904 12 1028 -18 1132 -12"
          stroke="url(#trailMist)" stroke-width="44" stroke-linecap="round" filter="url(#mistBlur)" opacity="0.9"/>

    <path d="M350 -12
             C394 -36 464 -42 548 -20
             C628 0 722 24 818 18
             C916 12 1010 -4 1088 12"
          stroke="url(#edgeMist)" stroke-width="24" stroke-linecap="round" filter="url(#fineMist)" opacity="0.95"/>

    <path d="M312 8
             C362 48 452 56 548 40
             C640 24 740 -12 832 -4
             C924 4 1002 42 1088 64"
          stroke="url(#edgeMist)" stroke-width="16" stroke-linecap="round" filter="url(#fineMist)" opacity="0.7"/>

    <g opacity="0.92">
      <path d="M920 -10 L1110 -22 L1186 0 L1110 22 L920 10 Z" fill="url(#blade)"/>
      <path d="M880 -16 L922 -10 L922 10 L880 16 L842 0 Z" fill="#8BD9FF" fill-opacity="0.72"/>
      <path d="M836 -10 L850 -10 L850 10 L836 10 Z" fill="#5A677B"/>
      <path d="M820 -18 L840 -8 L840 8 L820 18 L786 0 Z" fill="#89D8FF" fill-opacity="0.72"/>
      <path d="M919 0 L1118 0" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round"/>
      <path d="M926 -8 L1110 -18" stroke="#9CE8FF" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
      <path d="M926 8 L1110 18" stroke="#9CE8FF" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g filter="url(#softGlow)" opacity="0.92">
      <path d="M898 -18
               C936 -48 1008 -54 1080 -30
               C1142 -10 1182 18 1210 36"
            stroke="#A8F6FF" stroke-opacity="0.34" stroke-width="34" stroke-linecap="round"/>
      <path d="M898 18
               C954 56 1036 64 1110 36
               C1168 14 1206 -18 1232 -40"
            stroke="#8FD8FF" stroke-opacity="0.24" stroke-width="28" stroke-linecap="round"/>
    </g>

    <g filter="url(#fineMist)">
      <ellipse cx="974" cy="-36" rx="72" ry="22" fill="#B5F7FF" fill-opacity="0.16"/>
      <ellipse cx="1038" cy="40" rx="88" ry="24" fill="#9BE0FF" fill-opacity="0.16"/>
      <ellipse cx="1148" cy="-14" rx="92" ry="26" fill="#A6EEFF" fill-opacity="0.15"/>
      <ellipse cx="1222" cy="18" rx="118" ry="30" fill="#7CCBFF" fill-opacity="0.12"/>
    </g>

    <g opacity="0.65">
      <circle cx="1072" cy="-6" r="3.5" fill="#E9FFFF"/>
      <circle cx="1116" cy="14" r="2.4" fill="#D7FBFF"/>
      <circle cx="1154" cy="-18" r="2.6" fill="#D7FBFF"/>
      <circle cx="1186" cy="22" r="1.9" fill="#B6F0FF"/>
      <circle cx="1212" cy="-4" r="1.8" fill="#B6F0FF"/>
      <circle cx="1250" cy="12" r="1.6" fill="#B6F0FF"/>
    </g>
  </g>

  <g>
    <circle cx="268" cy="414" r="7" fill="#8FE9FF"/>
    <circle cx="268" cy="414" r="16" stroke="#8FE9FF" stroke-opacity="0.28"/>
    <path d="M286 414H404" stroke="#8FE9FF" stroke-opacity="0.72" stroke-width="2"/>
    <text x="420" y="407" fill="#E9F8FF" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">贴剑体薄雾</text>
    <text x="420" y="438" fill="#B7D1E6" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">不是一条硬线，而是一层低对比、半透明、跟着剑身起伏的雾膜</text>
  </g>

  <g>
    <circle cx="1252" cy="360" r="7" fill="#8FE9FF"/>
    <circle cx="1252" cy="360" r="16" stroke="#8FE9FF" stroke-opacity="0.28"/>
    <path d="M1140 360H1234" stroke="#8FE9FF" stroke-opacity="0.72" stroke-width="2"/>
    <text x="930" y="353" fill="#E9F8FF" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">边缘散雾</text>
    <text x="850" y="384" fill="#B7D1E6" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">从剑刃边缘被卷出去，先成丝，后成团，再慢慢虚掉</text>
  </g>

  <g>
    <circle cx="554" cy="610" r="7" fill="#8FE9FF"/>
    <circle cx="554" cy="610" r="16" stroke="#8FE9FF" stroke-opacity="0.28"/>
    <path d="M572 610H724" stroke="#8FE9FF" stroke-opacity="0.72" stroke-width="2"/>
    <text x="740" y="603" fill="#E9F8FF" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">尾端消散</text>
    <text x="740" y="634" fill="#B7D1E6" font-size="18" font-family="Microsoft YaHei, PingFang SC, sans-serif">后方不是拖很多亮点，而是大片低密度雾气慢慢散开</text>
  </g>

  <g>
    <rect x="182" y="708" width="1238" height="58" rx="14" fill="#0C1D2D" fill-opacity="0.7" stroke="#D8B56B" stroke-opacity="0.16"/>
    <text x="210" y="744" fill="#F1D793" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif">实现建议</text>
    <text x="340" y="744" fill="#C4D9EB" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif">主形仍是贴身流带；粒子只留少量微点；新增 2~3 层软雾 sprite / 拉伸雾片，按剑身朝向与速度做扩散和衰减</text>
  </g>
</svg>
